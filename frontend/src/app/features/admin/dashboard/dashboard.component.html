<div class="dashboard">
  <h2>Tableau de bord</h2>

  <div class="stats-grid">
    <div class="stat-card"><div class="stat-icon">📦</div><div class="stat-info"><span class="stat-value">{{ pendingOrders }}</span><span class="stat-label">Commandes en attente</span></div></div>
    <div class="stat-card"><div class="stat-icon">🔧</div><div class="stat-info"><span class="stat-value">{{ activeRepairs }}</span><span class="stat-label">Réparations en cours</span></div></div>
    <div class="stat-card highlight"><div class="stat-icon">🔔</div><div class="stat-info"><span class="stat-value">{{ unreadCount }}</span><span class="stat-label">Notifications non lues</span></div></div>
  </div>

  <div class="notif-section">
    <h3>Dernières activités</h3>
    <app-spinner *ngIf="loading"></app-spinner>
    <div class="notif-list" *ngIf="!loading">
      <div class="notif-item" *ngFor="let n of notifications" [class.unread]="!n.isRead" (click)="markRead(n.id)">
        <span class="notif-icon">{{ getTypeIcon(n.type) }}</span>
        <div class="notif-body">
          <p>{{ n.message }}</p>
          <span class="notif-meta">{{ n.clientName }} · {{ n.createdAt | date:'dd/MM HH:mm' }}</span>
        </div>
        <span class="unread-dot" *ngIf="!n.isRead"></span>
      </div>
      <p class="empty" *ngIf="notifications.length === 0">Aucune activité récente</p>
    </div>
  </div>
</div>
